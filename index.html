<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório - Professor Pedro Salvato</title>
    <style>
        /* Importando uma fonte amigável e limpa do Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        .repositorio-prof-pedro {
            font-family: 'Nunito', sans-serif;
            background-color: #fcfcfb; /* Fundo suave, não é 100% branco para não cansar a vista */
            color: #333333;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .repositorio-prof-pedro header {
            max-width: 700px;
            margin-bottom: 3rem;
        }

        .repositorio-prof-pedro h1 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .repositorio-prof-pedro p {
            font-size: 1.2rem;
            color: #555555;
            line-height: 1.6;
        }

        .repositorio-botoes {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            max-width: 800px;
        }

        .btn-turma {
            background-color: #4A90E2; /* Azul amigável e convidativo */
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 2.5rem;
            border-radius: 50px; /* Bordas bem arredondadas para um tom humano/informal */
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
        }

        .btn-turma:hover {
            background-color: #357ABD;
            transform: translateY(-3px); /* Leve efeito de flutuação ao passar o mouse */
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>

    <div class="repositorio-prof-pedro">
        <header>
            <h1>Olá! Bem-vindo ao repositório do professor Pedro Salvato.</h1>
            <p>Aqui você encontra todos os materiais das nossas aulas. Por favor, clique em um dos botões abaixo para ir para o conteúdo da sua turma.</p>
        </header>

        <main class="repositorio-botoes">
            <a href="404.html" class="btn-turma">Turma 1 - Informática básica</a>
            <a href="sala2.html" class="btn-turma">Turma 2 - Operador de processos</a>
            <a href="404.html" class="btn-turma">Turma 201</a>
            <a href="404.html" class="btn-turma">Material Extra</a>
        </main>
    </div>

</body>
</html>
