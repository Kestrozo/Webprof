<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turma Indisponível - Prof. Pedro Salvato</title>
    <style>
        /* Importando a fonte Nunito do Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        /* Estilos gerais da página */
        body {
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #fcfcfb;
            color: #333333;
            margin: 0;
            padding: 4rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Área branca principal */
        main {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-top: 2rem;
        }

        .icone {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1rem;
        }

        p {
            color: #555555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Estilo do botão de retorno */
        .btn-retornar {
            display: inline-block;
            background-color: #4A90E2;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .btn-retornar:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(74, 144, 226, 0.3);
        }
    </style>
</head>
<body>

    <main>
        <!-- Ícone amigável de construção/aviso -->
        <div class="icone">🚧</div>
        
        <h1>404 - Not Found</h1>
        <h2>Ops!</h2>
        <p>Essa turma ainda não foi criada ou os materiais ainda não estão disponíveis no momento.</p>
        
        <!-- Botão que leva de volta para a página inicial -->
        <a href="index.html" class="btn-retornar">Clique aqui para retornar</a>
    </main>

</body>
</html>
